[build]
  command = "npm run build"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/webhook"
  to = "/.netlify/functions/telegram-webhook"
  status = 200

[[redirects]]
  from = "/cron/broadcast"
  to = "/.netlify/functions/process-broadcast"
  status = 200
